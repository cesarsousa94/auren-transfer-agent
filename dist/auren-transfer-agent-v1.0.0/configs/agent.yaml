app:
  name: auren-transfer-agent
  description: High-reliability media transfer agent

runtime:
  environment: local
  data_dir: ./data
  temp_dir: ./tmp

logger:
  level: info
  format: json
  timestamp: true
  service: auren-transfer-agent

server:
  enabled: false
  host: 0.0.0.0
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

worker:
  enabled: false
  concurrency: 1
  shutdown_timeout: 30s

queue:
  driver: memory
  memory_capacity: 100
  poll_interval: 1s
  redis_address: redis://localhost:6379
  redis_stream: auren.transfer.jobs
  redis_consumer_group: auren-transfer-agents
  rabbitmq_url: amqp://guest:guest@localhost:5672/
  rabbitmq_queue: auren.transfer.jobs
  nats_url: nats://localhost:4222
  nats_subject: auren.transfer.jobs
  nats_queue_group: auren-transfer-agents

resolver:
  default_user_agent: AurenTransferAgent/1.0
  follow_redirects: true
  max_redirects: 10

download:
  temp_dir: ./tmp/downloads
  connect_timeout: 15s
  response_header_timeout: 30s
  idle_timeout: 60s
  max_retries: 3
  retry_backoff: 2s
  chunk_size: 8MiB
  resume_enabled: true
  checksum: sha256

upload:
  driver: local
  max_retries: 3
  retry_backoff: 2s
  multipart_enabled: true
  part_size: 16MiB

storage:
  driver: local
  endpoint: ""
  bucket: ""
  region: us-east-1
  local_path: ./data/storage
  use_path_style: true

metrics:
  enabled: false
  host: 0.0.0.0
  port: 9090
  path: /metrics

heartbeat:
  enabled: false
  interval: 30s
  timeout: 10s

security:
  api_key_required: false
  api_key: ""
  api_key_hash: ""
  token_header: Authorization
  allow_insecure_http: true
  jwt_enabled: false
  jwt_secret: ""
  jwt_ttl: 15m
  mtls_enabled: false
  mtls_required_cn: ""
  rbac_enabled: false
  rate_limit_enabled: false
  rate_limit_per_minute: 60
  secrets_provider: env
  secrets_file: ""
