apiVersion: v1
kind: Namespace
metadata:
  name: auren-transfer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auren-transfer-agent-config
  namespace: auren-transfer
data:
  AUREN_RUNTIME_ENVIRONMENT: production
  AUREN_LOGGER_FORMAT: json
  AUREN_SERVER_ENABLED: "true"
  AUREN_SERVER_HOST: 0.0.0.0
  AUREN_SERVER_PORT: "8080"
  AUREN_QUEUE_DRIVER: memory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auren-transfer-agent
  namespace: auren-transfer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auren-transfer-agent
  template:
    metadata:
      labels:
        app: auren-transfer-agent
    spec:
      containers:
        - name: agent
          image: auren-transfer-agent:v1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: auren-transfer-agent-config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auren-transfer-agent
  namespace: auren-transfer
spec:
  selector:
    app: auren-transfer-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
