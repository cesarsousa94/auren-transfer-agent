services:
  auren-transfer-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: auren-transfer-agent:v1.13.1
    container_name: auren-transfer-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AUREN_RUNTIME_ENVIRONMENT: production
      AUREN_SERVER_ENABLED: "true"
      AUREN_SERVER_HOST: 0.0.0.0
      AUREN_SERVER_PORT: "8080"
      AUREN_RUNTIME_DATA_DIR: /var/lib/auren-transfer-agent
      AUREN_RUNTIME_TEMP_DIR: /tmp/auren-transfer-agent
      AUREN_DOWNLOAD_TEMP_DIR: /tmp/auren-transfer-agent/downloads
      AUREN_AGENT_LOG_DIR: /var/lib/auren-transfer-agent/logs
      AUREN_STORAGE_LOCAL_PATH: /var/lib/auren-transfer-agent/storage
      AUREN_MEDIA_HUB_ENABLED: "true"
      AUREN_DOCKER_AUTO_BOOTSTRAP: "true"
      AUREN_AGENT_CONFIG_PATH: /etc/auren-transfer-agent/agent.yaml
      AUREN_AGENT_ENV_FILE: /etc/auren-transfer-agent/.env
      AUREN_MEDIA_HUB_BOOTSTRAP_TOKEN_ENDPOINT: ${AUREN_MEDIA_HUB_BOOTSTRAP_TOKEN_ENDPOINT:-/api/internal/nodes/bootstrap-token}
      AUREN_MEDIA_HUB_ROLE: ${AUREN_MEDIA_HUB_ROLE:-worker}
      AUREN_MEDIA_HUB_REGION: ${AUREN_MEDIA_HUB_REGION:-sa-east-1}
      AUREN_MEDIA_HUB_TRANSFER_ENABLED: "true"
      AUREN_MEDIA_HUB_CLAIM_ENABLED: "true"
      AUREN_MEDIA_HUB_CLAIM_INTERVAL: ${AUREN_MEDIA_HUB_CLAIM_INTERVAL:-2s}
      AUREN_MEDIA_HUB_PROGRESS_INTERVAL: ${AUREN_MEDIA_HUB_PROGRESS_INTERVAL:-5s}
      AUREN_MEDIA_HUB_CONTROL_INTERVAL: ${AUREN_MEDIA_HUB_CONTROL_INTERVAL:-10s}
      AUREN_MEDIA_HUB_MAX_CONCURRENT_JOBS: ${AUREN_MEDIA_HUB_MAX_CONCURRENT_JOBS:-2}
      AUREN_MEDIA_HUB_ACCEPTED_OPERATIONS: ${AUREN_MEDIA_HUB_ACCEPTED_OPERATIONS:-media_remote_download,playlist_m3u_download,remote_download}
      AUREN_MEDIA_HUB_WORK_DIR: /var/lib/auren-transfer-agent/transfer
      AUREN_MEDIA_HUB_GATEWAY_ENABLED: ${AUREN_MEDIA_HUB_GATEWAY_ENABLED:-false}
      AUREN_DEV_UI_ENABLED: "true"
      AUREN_DEV_UI_CAPTURE_BODIES: "true"
      AUREN_DEV_UI_BODY_LIMIT_BYTES: ${AUREN_DEV_UI_BODY_LIMIT_BYTES:-16384}
    ports:
      - "${AUREN_AGENT_HTTP_PORT:-8080}:8080"
    volumes:
      - auren-transfer-agent-data:/var/lib/auren-transfer-agent
      - auren-transfer-agent-tmp:/tmp/auren-transfer-agent
    healthcheck:
      test: ["CMD", "/usr/local/bin/auren-transfer-agent", "doctor", "--config", "/etc/auren-transfer-agent/agent.yaml", "--env-file", "/etc/auren-transfer-agent/.env"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  auren-transfer-agent-data:
  auren-transfer-agent-tmp:
