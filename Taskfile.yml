version: '3'

vars:
  APP_NAME: auren-transfer-agent
  CMD_PATH: ./cmd/agent
  BIN_DIR: bin
  VERSION: v1.6.0
  IMAGE: auren-transfer-agent:v1.6.0

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go files
    cmds:
      - gofmt -w $(find . -name '*.go' -not -path './vendor/*')

  test:
    desc: Run tests
    cmds:
      - go test ./...

  build:
    desc: Build the agent binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/{{.APP_NAME}} {{.CMD_PATH}}

  run:
    desc: Run the agent with default configuration
    cmds:
      - go run {{.CMD_PATH}}

  serve:
    desc: Run local HTTP server
    cmds:
      - AUREN_SERVER_ENABLED=true go run {{.CMD_PATH}} serve --config ./configs/agent.yaml

  version:
    desc: Print version metadata
    cmds:
      - go run {{.CMD_PATH}} --version

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -f docker/Dockerfile -t {{.IMAGE}} .

  compose-up:
    desc: Start Docker Compose stack
    cmds:
      - docker compose -f docker/docker-compose.yml up --build

  deb:
    desc: Build Debian package
    deps: [build]
    cmds:
      - ./scripts/build-deb.sh {{.VERSION}}

  apt-repo:
    desc: Build local APT repository skeleton
    deps: [deb]
    cmds:
      - ./scripts/build-apt-repo.sh

  release:
    desc: Create release archive
    cmds:
      - ./scripts/release.sh {{.VERSION}}

  release-dry-run:
    desc: Validate release pipeline
    cmds:
      - ./scripts/release.sh {{.VERSION}} --dry-run

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}} dist
